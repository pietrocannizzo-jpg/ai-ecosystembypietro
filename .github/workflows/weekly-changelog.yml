name: Weekly AI Changelog Update

on:
  schedule:
    # Every Friday at 10:00 UTC (~11:00 CET)
    - cron: "0 10 * * 5"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code changelog update
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are maintaining an AI ecosystem tracker. Your job is to update the timeline data in src/data/cardData.ts with real, verified events from the past week.

            ## Steps:

            1. Read src/data/cardData.ts and extract all card IDs and their existing timeline entries
            2. For each major card (focus on the top 30 most active companies), search the web for:
               - Official blog posts and changelogs
               - Model releases and version updates
               - Funding rounds and acquisitions
               - Major partnerships and integrations
               - Product launches and feature updates
               - Pricing changes
               - Safety/policy announcements
            3. Key sources to check per company:
               - OpenAI: openai.com/blog, platform.openai.com/docs/changelog
               - Anthropic: anthropic.com/news, anthropic.com/research
               - Google: blog.google, deepmind.google/blog
               - Cursor: cursor.com/changelog
               - Midjourney: updates.midjourney.com
               - GitHub Copilot: github.blog/changelog
               - Runway: runwayml.com/changelog
               - ElevenLabs: elevenlabs.io/blog
               - Stability AI: stability.ai/news
               - Meta: ai.meta.com/blog
               - Mistral: mistral.ai/news
               - Check TechCrunch, The Verge, and CNBC for funding/business news
            4. For each new event found, add a timeline entry in this exact format:
               { date: "YYYY-MM-DD", description: "One sentence description", type: "TYPE" }
               Valid types: model, product, api, funding, business, partnership, safety, research, launch, update, milestone
            5. Rules:
               - Only add events you can verify from official sources
               - Do NOT add speculative or rumored events
               - Do NOT duplicate entries already in the timeline
               - Keep descriptions to one clear sentence
               - Use exact dates (YYYY-MM-DD) not approximate months
               - Insert entries in chronological order within the timeline array
               - Do NOT remove or modify existing entries
            6. After updating, commit and push the changes.
            7. Report what you added: list each new entry with the card name, date, and description
          allowed_tools: "WebSearch,WebFetch,Read,Edit,Write,Glob,Grep,Bash(git add*),Bash(git commit*),Bash(git push*),Bash(git status),Bash(git log*),Bash(git diff*)"
          timeout_minutes: 30
